name: Renovate

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.16
        with:
          # Uses the repository token to open PRs. You may also prefer to install
          # the Renovate GitHub App instead: https://github.com/apps/renovate
          token: ${{ secrets.GITHUB_TOKEN }}
